<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receptionist Profile - HealthSphere</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
background:linear-gradient(135deg,#2563eb,#3b82f6);
padding:40px;
text-align:center;
color:white;
}

.profile-img{
width:130px;
height:130px;
border-radius:50%;
border:5px solid white;
object-fit:cover;
margin-bottom:15px;
}

.header h2{
font-size:28px;
margin-bottom:5px;
}

.content{
padding:30px;
}

.profile-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#f8faff;
padding:20px;
border-radius:15px;
}

.card h3{
color:#2563eb;
margin-bottom:15px;
}

.info{
margin-bottom:12px;
font-size:15px;
}

.info strong{
color:#111827;
}

.btn{
margin-top:20px;
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#1d4ed8;
}

@media(max-width:768px){
.profile-grid{
grid-template-columns:1fr;
}
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef2ff;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
border-radius:25px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.12);
}

.header{
background:linear-gradient(135deg,#2563eb,#3b82f6);
padding:50px 20px;
text-align:center;
color:white;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
box-shadow:0 8px 20px rgba(0,0,0,.2);
background:white;
}

.header h2{
margin-top:15px;
font-size:34px;
font-weight:700;
}

.header p{
font-size:18px;
opacity:.9;
margin-top:5px;
}

.content{
padding:35px;
}

.profile-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.card{
background:#f8faff;
padding:25px;
border-radius:18px;
transition:.3s;
border:1px solid #e5e7eb;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(37,99,235,.15);
}

.card h3{
color:#2563eb;
margin-bottom:20px;
font-size:24px;
}

.info{
margin-bottom:15px;
font-size:17px;
line-height:1.6;
}

.info strong{
color:#111827;
}

.btn{
margin-top:30px;
background:#2563eb;
color:white;
border:none;
padding:14px 24px;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:600;
transition:.3s;
}

.btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

@media(max-width:768px){

.profile-grid{
grid-template-columns:1fr;
}

.header h2{
font-size:28px;
}

.profile-img{
width:120px;
height:120px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="./logo.png"
alt="Profile"
class="profile-img">

<h2>Priya Sharma</h2>
<p>Receptionist</p>

</div>

<div class="content">

<div class="profile-grid">

<div class="card">

<h3>Personal Information</h3>

<div class="info">
<strong>Full Name:</strong> Ankita Parichha
</div>

<div class="info">
<strong>Email:</strong> ankita@gmail.com
</div>

<div class="info">
<strong>Phone:</strong> 9876543210
</div>

<div class="info">
<strong>Gender:</strong> Female
</div>

<div class="info">
<strong>Date of Birth:</strong> 21-06-2004
</div>

</div>

<div class="card">

<h3>Work Information</h3>

<div class="info">
<strong>Employee ID:</strong> REC001
</div>

<div class="info">
<strong>Department:</strong> Reception
</div>

<div class="info">
<strong>Joining Date:</strong> 01-01-2025
</div>

<div class="info">
<strong>Shift:</strong> Morning Shift
</div>

<div class="info">
<strong>Status:</strong> Active
</div>

</div>

</div>

<button class="btn">
✏️ Edit Profile
</button>

</div>

</div>

</body>
</html>
