
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports Dashboard - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
color:#5B3FC4;
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
}

.report-section{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-top:20px;
}

.report-section h2{
color:#5B3FC4;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.btn{
background:#22C069;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

<h1>📊 Reports Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Patients</h3>
<p id="patients">0</p>
</div>

<div class="card">
<h3>Total Doctors</h3>
<p id="doctors">0</p>
</div>

<div class="card">
<h3>Appointments</h3>
<p id="appointments">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p id="revenue">₹0</p>
</div>

<div class="card">
<h3>Prescriptions</h3>
<p id="prescriptions">0</p>
</div>

<div class="card">
<h3>Lab Reports</h3>
<p id="labReports">0</p>
</div>

</div>

<div class="report-section">

<h2>📅 Recent Activity</h2>

<table>

<tr>
<th>Activity</th>
<th>Status</th>
</tr>

<tr>
<td>Patient Registrations</td>
<td id="patientStatus">0</td>
</tr>

<tr>
<td>Appointments Booked</td>
<td id="appointmentStatus">0</td>
</tr>

<tr>
<td>Prescriptions Added</td>
<td id="prescriptionStatus">0</td>
</tr>

<tr>
<td>Lab Reports Uploaded</td>
<td id="labStatus">0</td>
</tr>

</table>

<button class="btn" onclick="printReport()">
🖨️ Print Report
</button>

</div>

</div>

<script>

// Patient Count

let patient =
JSON.parse(
localStorage.getItem("patientData")
);

if(patient){

document.getElementById("patients").innerHTML = "1";
document.getElementById("patientStatus").innerHTML = "1";

}

// Doctor Count

let doctorProfile =
JSON.parse(
localStorage.getItem("doctorProfile")
);

if(doctorProfile){

document.getElementById("doctors").innerHTML = "1";

}

// Appointments

let appointments =
JSON.parse(
localStorage.getItem("appointments")
) || [];

document.getElementById("appointments").innerHTML =
appointments.length;

document.getElementById("appointmentStatus").innerHTML =
appointments.length;

// Prescriptions

let prescriptions =
JSON.parse(
localStorage.getItem("prescriptions")
) || [];

document.getElementById("prescriptions").innerHTML =
prescriptions.length;

document.getElementById("prescriptionStatus").innerHTML =
prescriptions.length;

// Lab Reports

let reports =
JSON.parse(
localStorage.getItem("labReports")
) || [];

document.getElementById("labReports").innerHTML =
reports.length;

document.getElementById("labStatus").innerHTML =
reports.length;

// Revenue

let revenue =
localStorage.getItem("billAmount") || 0;

document.getElementById("revenue").innerHTML =
"₹" + revenue;

// Print

function printReport(){

window.print();

}

</script>

</body>
</html>
