
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Lab Reports</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
}

button{
background:#22c55e;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.card{
background:#f8f9ff;
padding:20px;
border-left:5px solid #2563eb;
border-radius:10px;
margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

<h1>🧪 Lab Reports</h1>

<input type="text"
id="patient"
placeholder="Patient Name">

<select id="reportType">
<option>Blood Test</option>
<option>X-Ray</option>
<option>MRI Scan</option>
<option>CT Scan</option>
<option>Urine Test</option>
</select>

<input type="text"
id="result"
placeholder="Report Result">

<button onclick="addReport()">
Save Report
</button>

<div id="reportList"></div>

</div>

<script>

loadReports();

function addReport(){

let patient =
document.getElementById("patient").value;

let reportType =
document.getElementById("reportType").value;

let result =
document.getElementById("result").value;

if(patient=="" || result==""){
alert("Fill all fields");
return;
}

let reports =
JSON.parse(
localStorage.getItem("labReports")
) || [];

reports.push({

patient:patient,
reportType:reportType,
result:result,
date:new Date().toLocaleDateString()

});

localStorage.setItem(
"labReports",
JSON.stringify(reports)
);

alert("Lab Report Added");

location.reload();

}

function loadReports(){

let reports =
JSON.parse(
localStorage.getItem("labReports")
) || [];

let list =
document.getElementById("reportList");

reports.forEach(function(r){

list.innerHTML +=

'<div class="card">' +

'<h3>'+r.patient+'</h3>' +

'<p><b>Report:</b> '+r.reportType+'</p>' +

'<p><b>Result:</b> '+r.result+'</p>' +

'<p><b>Date:</b> '+r.date+'</p>' +

'</div>';

});

}

</script>

</body>
</html>
