<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSphere Billing</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#5B3FC4;
}

.bill-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #ddd;
}

.total{
    font-size:24px;
    font-weight:bold;
    color:#22C069;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#5B3FC4;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#4527a0;
}
</style>
</head>

<body>

<div class="container">

<h1>Patient Billing</h1>

<div class="bill-row">
    <span>Patient Name</span>
    <span id="patientName">Loading...</span>
</div>

<div class="bill-row">
    <span>Patient ID</span>
    <span id="patientId">Loading...</span>
</div>

<div class="bill-row">
    <span>Doctor Name</span>
    <span id="doctorName">Loading...</span>
</div>

<div class="bill-row">
    <span>Consultation Fee</span>
    <span id="consulationFree">₹0</span>
</div>

<div class="bill-row">
    <span>Medicine Charges</span>
    <span id="medicineCharge">₹0</span>
</div>

<div class="bill-row">
    <span>Lab Charges</span>
    <span id="labCharge">₹0</span>
</div>

<div class="bill-row total">
    <span>Total Amount</span>
    <span id="totalAmount">₹0</span>
</div>

<button onclick="payNow()">
Pay Now
</button>

</div>

<script>
function goToPayment(){
    window.location.href="payment.html";
}
</script>
<script>


const patient = JSON.parse(localStorage.getItem("patient"));

window.onload = function(){

    loadBill();

};

async function loadBill(){

    try{

        const response = await fetch(

            `http://localhost:5000/api/bills/patient/${patient.user_id}`

        );

        const data = await response.json();

        if(data.bills.length===0){

            alert("No Bills Available");

            return;

        }

        const bill = data.bills[0];

        document.getElementById("patientName").innerHTML =
        bill.full_name;

        document.getElementById("patientId").innerHTML =
        bill.patient_code;

        document.getElementById("doctorName").innerHTML =
        "Dr. " + bill.doctor_name;

        document.getElementById("consultationFee").innerHTML =
        "₹"+bill.amount;

        document.getElementById("medicineCharge").innerHTML =
        "₹0";

        document.getElementById("labCharge").innerHTML =
        "₹0";

        document.getElementById("totalAmount").innerHTML =
        "₹"+bill.amount;

    }

    catch(error){

        console.log(error);

    }

}

function payNow(){

    window.location.href="payment.html";

}
</script>

</body>
</html>
