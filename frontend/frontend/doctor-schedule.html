
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Schedule - HealthSphere</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.card{
background:#f8f9ff;
padding:20px;
border-radius:12px;
margin-bottom:20px;
border-left:5px solid #5B3FC4;
}

label{
display:block;
font-weight:bold;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin-top:15px;
}

.save{
background:#22C069;
}

.leave{
background:#e74c3c;
margin-left:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#5B3FC4;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

<h1>📅 Doctor Schedule</h1>

<div class="card">

<h3>Set Availability</h3>

<label>Available Date</label>
<input type="date">

<label>Start Time</label>
<input type="time">

<label>End Time</label>
<input type="time">

<button class="btn save"
onclick="saveSchedule()">
Save Schedule
</button>

<button class="btn leave"
onclick="requestLeave()">
Request Leave
</button>

</div>

<div class="card">

<h3>Upcoming Appointments</h3>

<table>

<tr>
<th>Patient</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

<tr>
<td>Rahul Kumar</td>
<td>20 June 2026</td>
<td>10:00 AM</td>
<td>Confirmed</td>
</tr>

<tr>
<td>Priya Sharma</td>
<td>20 June 2026</td>
<td>11:30 AM</td>
<td>Confirmed</td>
</tr>

<tr>
<td>Amit Das</td>
<td>21 June 2026</td>
<td>02:00 PM</td>
<td>Pending</td>
</tr>

</table>

</div>

</div>

<script>

function saveSchedule(){
alert("Schedule Saved Successfully!");
}

function requestLeave(){
alert("Leave Request Submitted!");
}

</script>

</body>
</html>
