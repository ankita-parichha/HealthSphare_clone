<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - HealthSphere</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#5B3FC4;
}

.amount{
    text-align:center;
    font-size:28px;
    color:#22C069;
    font-weight:bold;
    margin:20px 0;
}

.payment-option{
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    cursor:pointer;
}

.payment-option:hover{
    background:#f5f5f5;
}

button{
    width:100%;
    padding:15px;
    background:#5B3FC4;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#4527a0;
}
</style>
</head>
<body>

<div class="container">

<h1>Payment Gateway</h1>

<div class="amount">
Total Amount: ₹2000
</div>

<h3>Select Payment Method</h3>

<div class="payment-option">
<input type="radio" name="payment" checked>
UPI (Google Pay / PhonePe / Paytm)
</div>

<div class="payment-option">
<input type="radio" name="payment">
Credit Card
</div>

<div class="payment-option">
<input type="radio" name="payment">
Debit Card
</div>

<div class="payment-option">
<input type="radio" name="payment">
Net Banking
</div>

<button onclick="paymentSuccess()">
Pay Now
</button>

</div>

<script>
function paymentSuccess(){
    alert("Payment Successful!");
    window.location.href="invoice.html";
}
</script>

</body>
</html>
