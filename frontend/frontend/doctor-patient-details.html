
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Details</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
color:#5B3FC4;
margin-bottom:20px;
}

.card{
background:#f8f9ff;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.card h3{
color:#5B3FC4;
margin-bottom:10px;
}

.btn{
background:#22C069;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

.btn:hover{
background:#169a51;
}

</style>
</head>
<body>

<div class="container">

<h1>👤 Patient Details</h1>

<div class="card">
<h3>Basic Information</h3>
<p><b>Name:</b> <span id="patientName"></span></p>

<p><b>Patient ID:</b> <span id="patientCode"></span></p>

<p><b>Age:</b> <span id="patientAge"></span></p>

<p><b>Gender:</b> <span id="patientGender"></span></p>

<p><b>Blood Group:</b> <span id="bloodGroup"></span></p>

<p><b>Phone:</b> <span id="patientPhone"></span></p>
</div>

<div class="card">

<h3>Medical History</h3>

<div id="medicalHistory">

Loading...

</div>

</div>
<div class="card">

<h3>Recent Lab Reports</h3>

<div id="labReports">

Loading...

</div>

</div>

<div class="card">

<h3>Current Medications</h3>

<div id="currentMedicine">
Loading...
</div>

</div>
<button class="btn" onclick="writePrescription()">
💊 Write Prescription
</button>

<button class="btn"
onclick="window.location.href='doctor-reports.html'">
📄 View Reports
</button>

</div>
<script>


const patientId = localStorage.getItem("selectedPatientId");

window.onload = function(){

   loadPatient();
loadPrescriptions();
loadMedicalHistory();
loadLabReports();
}

// ==========================
// Load Patient Information
// ==========================

async function loadPatient(){

    const response = await fetch(
        `http://localhost:5000/api/patients/${patientId}`
    );

    const data = await response.json();

    console.log(data);

    if(!data.success){
        alert(data.message);
        return;
    }

    const patient = data.patient;

    document.getElementById("patientName").innerText = patient.full_name;
    document.getElementById("patientCode").innerText = patient.patient_code;
    document.getElementById("patientAge").innerText = patient.age;
    document.getElementById("patientGender").innerText = patient.gender;
    document.getElementById("bloodGroup").innerText =
        patient.blood_group || "N/A";
    document.getElementById("patientPhone").innerText = patient.phone;

}
// ==========================
// Load Prescriptions
// ==========================

async function loadPrescriptions(){

    const response = await fetch(
        `http://localhost:5000/api/prescriptions/patient/${patientId}`
    );

    const data = await response.json();


    console.log(data);

    const box = document.getElementById("currentMedicine");

    box.innerHTML = "";

    if (!data.success || data.prescriptions.length === 0) {
        box.innerHTML = "No Medicines";
        return;
    }

    
    data.prescriptions.forEach(p => {

        box.innerHTML += `
            <p>
                ✔ ${p.medicines}
                (${p.dosage})
            </p>
        `;

    });

}
// ==========================
// Load Medical History
// ==========================

async function loadMedicalHistory(){

    try{

        const response = await fetch(
            `http://localhost:5000/api/medical-records/patient/${patientId}`
        );

        const data = await response.json();

        console.log(data);

        const box =
        document.getElementById("medicalHistory");

        box.innerHTML = "";

        if(data.records.length===0){

            box.innerHTML =
            "No Medical History";

            return;

        }

        data.records.forEach(record=>{

            box.innerHTML += `

            <div style="margin-bottom:20px;">

            <p><b>Diagnosis:</b>
            ${record.diagnosis}</p>

            <p><b>Treatment:</b>
            ${record.treatment}</p>

            <p><b>Symptoms:</b>
${record.symptoms}</p>

<p><b>Remarks:</b>
${record.remarks}</p>
            <p><b>Doctor:</b>
            Dr. ${record.first_name}
            ${record.last_name}</p>

            <hr>

            </div>

            `;

        });

    }

    catch(error){

        console.log(error);

    }

}
async function loadLabReports(){

    try{

        const response = await fetch(
            `http://localhost:5000/api/lab-reports/patient/${patientId}`
        );

        const data = await response.json();

        console.log(data);

        const box = document.getElementById("labReports");

        box.innerHTML = "";

        if(data.reports.length===0){

            box.innerHTML = "No Lab Reports";

            return;

        }

        data.reports.forEach(report=>{

            box.innerHTML += `

            <div style="margin-bottom:20px">

                <p><b>Test:</b> ${report.test_name}</p>

                <p><b>Result:</b> ${report.test_result}</p>

                <p><b>Normal Range:</b> ${report.normal_range}</p>

                <p><b>Date:</b>
                ${new Date(report.report_date).toLocaleDateString("en-GB")}
                </p>

                <p><b>Remarks:</b> ${report.remarks}</p>

                <hr>

            </div>

            `;

        });

    }

    catch(error){

        console.log(error);

    }

}
function writePrescription(){

    localStorage.setItem(
        "prescriptionPatientId",
        patientId
    );

    window.location.href =
    "doctor-prescription.html";

}
</script>
</body>
</html>
