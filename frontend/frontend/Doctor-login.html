<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Login - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#E0F7FA,
#F1FFF8,
#D1FAE5
);
}

.container{
width:430px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:100px;
height:100px;
object-fit:contain;
}

.logo h2{
color:#2563EB;
margin-top:10px;
font-size:30px;
}

.portal{
color:#22C069;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:2px solid #E5E7EB;
border-radius:10px;
outline:none;
font-size:15px;
}

input:focus{
border-color:#22C069;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(
135deg,
#22C069,
#2563EB
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
opacity:.9;
}

.register-link{
text-align:center;
margin-top:15px;
}

.register-link a{
text-decoration:none;
color:#2563EB;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">

<img src="./logo.png" alt="Logo">

<h2>HealthSphere</h2>

<div class="portal">
👨‍⚕️ Doctor Portal
</div>

</div>

<p class="subtitle">
Manage Patients, Appointments,
Prescriptions & Medical Records
</p>

<input
type="email"
id="email"
placeholder="Doctor Email">

<input
type="password"
id="password"
placeholder="Password">

<button
class="login-btn"
onclick="login()">
Login as Doctor
</button>



</div>

<script>
    if(localStorage.getItem("patient")){

    alert("You are already logged in as a Patient. Please logout first.");

    window.location.href = "Patient-dashboard.html";

}



async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill all fields");
        return;
    }

    try {

        const response = await fetch(
            "http://localhost:5000/api/doctors/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const result = await response.json();

        alert(result.message);

        if (result.success) {

            localStorage.setItem(
    "loggedInDoctor",
    JSON.stringify(result.doctor)
);
console.log(result.doctor);
            window.location.href = "Doctor-dashboard.html";

        }

    } catch (error) {

        console.log(error);
        alert("Server Error");

    }

}


</script>

</body>
</html>
