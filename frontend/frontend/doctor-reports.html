
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Reports - HealthSphere</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.report-card{
background:#f8f9ff;
padding:20px;
border-left:5px solid #22C069;
border-radius:10px;
margin-bottom:20px;
}

.report-card h3{
color:#5B3FC4;
margin-bottom:10px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
resize:none;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin-top:10px;
}

.upload{
background:#22C069;
}

.download{
background:#5B3FC4;
}

.approve{
background:#f39c12;
}

</style>
</head>

<body>

<div class="container">

<h1>📄 Patient Reports</h1>

<div id="reportList"></div>
<label>Doctor Remarks</label>

<textarea rows="5"
placeholder="Write report observations and recommendations..."></textarea>

<br>

<input type="file">

<br>

<button class="btn upload"
onclick="uploadReport()">
Upload Report
</button>

<button class="btn approve"
onclick="approveReport()">
Approve Report
</button>

</div>

<script>

const patientId = localStorage.getItem("selectedPatientId");

window.onload = loadReports;

async function loadReports(){

    try{

        const response = await fetch(
            `http://localhost:5000/api/lab-reports/patient/${patientId}`
        );

        const data = await response.json();

        console.log(data);

        const list = document.getElementById("reportList");

        list.innerHTML = "";

        if(!data.success || data.reports.length === 0){

            list.innerHTML = "<h3>No Lab Reports Available</h3>";

            return;
        }

        data.reports.forEach(report=>{

            list.innerHTML += `

            <div class="report-card">

                <h3>${report.test_name}</h3>

                <p><b>Result:</b> ${report.test_result}</p>

                <p><b>Normal Range:</b> ${report.normal_range}</p>

                <p><b>Date:</b> ${new Date(report.report_date).toLocaleDateString()}</p>

                <p><b>Remarks:</b> ${report.remarks || "No Remarks"}</p>

            </div>

            `;

        });

    }
    catch(error){

        console.log(error);

    }

}

</script>

</body>
</html>
