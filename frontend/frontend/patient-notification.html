
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - HealthSphere</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.notification{
padding:20px;
margin-bottom:15px;
border-radius:10px;
display:flex;
align-items:center;
gap:15px;
}

.appointment{
background:#eef4ff;
border-left:5px solid #5B3FC4;
}

.payment{
background:#fff8e7;
border-left:5px solid #f39c12;
}

.lab{
background:#e8fff0;
border-left:5px solid #22C069;
}

.emergency{
background:#ffeaea;
border-left:5px solid #e74c3c;
}

.icon{
font-size:28px;
}

.text h3{
margin-bottom:5px;
}

.text p{
color:#555;
}

</style>
</head>
<body>

<div class="container">

<h1>🔔 Notifications</h1>

<div id="notificationContainer">




</div>

</div>
<script>
   const patient =
JSON.parse(localStorage.getItem("patient"));

async function loadNotifications(){

const response =
await fetch(
`https://healthsphare-clone.onrender.com/api/notifications/${patient.patient_id}`
);

const data =
await response.json();

const container =
document.getElementById("notificationContainer");

container.innerHTML = "";

if(data.notifications.length==0){

container.innerHTML =
"<p>No Notifications Available</p>";

return;

}

data.notifications.forEach(n=>{

container.innerHTML += `
<div class="notification appointment">

<div class="icon">📅</div>

<div class="text">

<h3>${n.title}</h3>

<p>${n.message}</p>

<small>
${new Date(n.created_at).toLocaleString()}
</small>

</div>

</div>
`;

});

}

loadNotifications();
</script>

</body>
</html>
