<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Patients - HealthSphere</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.view-btn{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.view-btn:hover{
background:#1d4ed8;
}

</style>
</head>
<body>

<div class="container">

<h1>👨‍⚕️ Today's Patients</h1>

<table>

<thead>
<tr>
<th>Patient Name</th>
<th>Time</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="patientTable">

<tr>
<td colspan="5">
No Patients Found
</td>
</tr>

</tbody>

</table>

</div>

<script>

const doctor =
JSON.parse(localStorage.getItem("doctor"));

if(!doctor){

alert("Please login first");

window.location.href =
"doctor-login.html";

}

// Load Today's Patients
async function loadTodayPatients(){

try{

const response = await fetch(
`http://localhost:5000/api/appointments/today/${doctor.doctor_id}`
);

const data = await response.json();

const table =
document.getElementById("patientTable");

table.innerHTML = "";

if(
!data.success ||
data.patients.length === 0
){

table.innerHTML =
"<tr><td colspan='5'>No Patients Found Today</td></tr>";

return;

}

data.patients.forEach(patient=>{

table.innerHTML += `

<tr>

<td>${patient.full_name}</td>

<td>${patient.appointment_time}</td>

<td>${patient.reason}</td>

<td>${patient.status}</td>

<td>

<button
class="view-btn"
onclick="viewHistory(${patient.patient_id})">

👁 View History

</button>

</td>

</tr>

`;

});

}
catch(error){

console.log(error);

alert("Unable to load patients");

}

}

function viewHistory(patientId){

window.location.href =
`patient-history.html?patient_id=${patientId}`;

}

window.onload =
loadTodayPatients;

</script>

</body>
</html>
