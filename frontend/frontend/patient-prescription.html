
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescriptions - HealthSphere</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.card{
background:#f8f9ff;
border-left:5px solid #5B3FC4;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.card h3{
color:#5B3FC4;
margin-bottom:10px;
}

.btn{
background:#22C069;
color:white;
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn:hover{
background:#169a51;
}

</style>
</head>
<body>

<div class="container">

<h1>💊 My Prescriptions</h1>

<div id="prescriptionContainer"></div>
</div>
<script>

const patient = JSON.parse(localStorage.getItem("patient"));

if (!patient) {

    alert("Please login first");
    window.location.href = "patient-login.html";

}

async function loadPrescriptions(){

    try{

        const response = await fetch(
        `http://localhost:5000/api/prescriptions/patient/${patient.patient_id}`
        );

        const data = await response.json();

        const container =
        document.getElementById("prescriptionContainer");

        container.innerHTML = "";

        if(
            !data.success ||
            data.prescriptions.length===0
        ){

            container.innerHTML=`

            <div class="card">

                <h3>No Prescriptions Available</h3>

                <p>
                Your prescriptions will appear here after doctor consultation.
                </p>

            </div>

            `;

            return;

        }

        data.prescriptions.forEach(item=>{

            container.innerHTML += `

            <div class="card">

                <h3>
                Dr. ${item.first_name} ${item.last_name}
                </h3>

                <p>
                <b>Specialization:</b>
                ${item.specialization}
                </p>

                <p>
                <b>Medicine:</b>
                ${item.medicine_name}
                </p>

                <p>
                <b>Dosage:</b>
                ${item.dosage}
                </p>

                <p>
                <b>Duration:</b>
                ${item.duration}
                </p>

                <p>
                <b>Notes:</b>
                ${item.notes}
                </p>

            </div>

            `;

        });

    }
    catch(error){

        console.log(error);

    }

}

window.onload = loadPrescriptions;

</script>
</body>
</html>
