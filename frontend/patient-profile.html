
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Profile - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:30px;
}

.profile-top{
text-align:center;
margin-bottom:30px;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
background:#ddd;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
}

.profile-top h2{
margin-top:15px;
color:#333;
}

.profile-top p{
color:gray;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:bold;
margin-bottom:6px;
}

input,
select,
textarea{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

textarea{
resize:none;
}

.full{
grid-column:1 / 3;
}

.btn{
margin-top:25px;
width:100%;
padding:15px;
background:#5B3FC4;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.btn:hover{
background:#4527a0;
}

</style>
</head>

<body>

<div class="container">

<h1>👤 Patient Profile</h1>

<div class="profile-top">

<div class="profile-img">
👨
</div>

<h2 id="patientName">Loading...</h2>
<p id="patientCode">Patient ID : Loading...</p>

</div>

<div class="form-grid">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="full_name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age">
</div>

<div class="form-group">
<label>Blood Group</label>
<select id="blood_group">
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
</select>
</div>

<div class="form-group full">
<label>Address</label>
<textarea rows="3" id="address">Bhubaneswar, Odisha</textarea>
</div>

<div class="form-group">
<label>Emergency Contact Name</label>
<input type="text" id="emergency_contact_name">
</div>

<div class="form-group">
<label>Emergency Contact Number</label>
<input type="text" id="emergency_contact_phone">
</div>

<div class="form-group full">
<label>Medical History</label>
<textarea rows="4">
No major illness.
</textarea>
</div>

</div>

<button class="btn" onclick="saveProfile()">
💾 Save Changes
</button>

</div>

<script>

const patient = JSON.parse(localStorage.getItem("patient"));

if (!patient) {
    alert("Please login first");
    window.location.href = "patient-login.html";
}

async function loadProfile() {

    try {

        const response = await fetch(
            `https://healthsphare-clone.onrender.com/api/auth/profile/${patient.user_id}`
        );

        const data = await response.json();

        if (!data.success) {
            alert(data.message);
            return;
        }

        const p = data.patient;

        document.getElementById("patientName").innerText = p.full_name;
        document.getElementById("patientCode").innerText = "Patient ID : " + p.patient_code;

        document.getElementById("full_name").value = p.full_name;
        document.getElementById("email").value = p.email;
        document.getElementById("phone").value = p.phone;
        document.getElementById("gender").value = p.gender;
        document.getElementById("age").value = p.age;
        document.getElementById("blood_group").value = p.blood_group;
        document.getElementById("address").value = p.address;
        document.getElementById("emergency_contact_name").value = p.emergency_contact_name;
        document.getElementById("emergency_contact_phone").value = p.emergency_contact_phone;

    } catch (err) {
        console.error(err);
        alert("Unable to load profile.");
    }

}

loadProfile();
async function saveProfile(){

    const profile = {

        full_name: document.getElementById("full_name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        gender: document.getElementById("gender").value,
        age: document.getElementById("age").value,
        blood_group: document.getElementById("blood_group").value,
        address: document.getElementById("address").value,
        emergency_contact_name: document.getElementById("emergency_contact_name").value,
        emergency_contact_phone: document.getElementById("emergency_contact_phone").value

    };

    try{

        const response = await fetch(
            `https://healthsphare-clone.onrender.com/api/auth/profile/${patient.user_id}`,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(profile)
            }
        );

        const result = await response.json();

        alert(result.message);

    }catch(error){

        console.error(error);
        alert("Server Error");

    }

}
</script>

</body>
</html>
