
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment History - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#5B3FC4;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.upcoming{
color:orange;
font-weight:bold;
}

.completed{
color:green;
font-weight:bold;
}

.cancelled{
color:red;
font-weight:bold;
}

.empty{
text-align:center;
padding:20px;
color:gray;
}

</style>
</head>
<body>

<div class="container">

<h1>📜 Appointment History</h1>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search Doctor Name..."
onkeyup="searchAppointments()">
</div>

<table>

<thead>

<tr>
<th>Date</th>
<th>Doctor</th>
<th>Time</th>
<th>Status</th>
</tr>

</thead>

<tbody id="appointmentTable">

<tr>
<td colspan="4" class="empty">
No appointments found
</td>
</tr>

</tbody>

</table>

</div>



<script>

const patient = JSON.parse(localStorage.getItem("patient"));

if(!patient){
    alert("Please login first");
    window.location.href="patient-login.html";
}

console.log(patient);

loadAppointments();

async function loadAppointments(){

    try{

        const response = await fetch(
            `https://healthsphare-clone.onrender.com/api/appointments/patient/${patient.patient_id}`
        );

        const data = await response.json();

        console.log(data);

        const table =
        document.getElementById("appointmentTable");

        table.innerHTML="";

        if(!data.success || data.appointments.length===0){

            table.innerHTML=`
            <tr>
            <td colspan="4" class="empty">
            No appointments found
            </td>
            </tr>
            `;

            return;
        }

        data.appointments.forEach(app=>{

            let statusClass="";

            if(app.status==="Pending")
                statusClass="upcoming";

            else if(app.status==="Confirmed")
                statusClass="completed";

            else
                statusClass="cancelled";

            table.innerHTML+=`

            <tr>

                <td>
                ${new Date(app.appointment_date)
                .toLocaleDateString("en-GB")}
                </td>

                <td>
                Dr. ${app.doctor_name}
                </td>

                <td>
                ${app.appointment_time}
                </td>

                <td class="${statusClass}">
                ${app.status}
                </td>

            </tr>

            `;

        });

    }

    catch(error){

        console.log(error);

    }

}

function searchAppointments(){

    let filter =
    document.getElementById("searchInput")
    .value.toUpperCase();

    let rows =
    document.querySelectorAll("#appointmentTable tr");

    rows.forEach(row=>{

        let doctor=row.cells[1];

        if(!doctor) return;

        let txt=doctor.innerText;

        row.style.display=
        txt.toUpperCase().includes(filter)
        ?"":"none";

    });

}


</script>

</body>
</html>
