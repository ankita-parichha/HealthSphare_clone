<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Profile - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
background:linear-gradient(135deg,#2563eb,#3b82f6);
padding:40px;
text-align:center;
color:white;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid white;
object-fit:cover;
background:white;
}

.header h2{
margin-top:15px;
font-size:32px;
}

.header p{
margin-top:5px;
font-size:18px;
}

.content{
padding:30px;
}

.profile-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#f8faff;
padding:25px;
border-radius:15px;
}

.card h3{
color:#2563eb;
margin-bottom:15px;
}

.info{
margin-bottom:12px;
font-size:16px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

.btn:hover{
background:#1d4ed8;
}

@media(max-width:768px){

.profile-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="logo.png"
class="profile-img"
alt="Doctor">

<h2 id="doctorName">
Doctor Name
</h2>

<p id="doctorSpecialization">
Specialization
</p>

</div>

<div class="content">

<div class="profile-grid">

<div class="card">

<h3>Personal Information</h3>

<div class="info">
<strong>Name:</strong>
<span id="name"></span>
</div>

<div class="info">
<strong>Email:</strong>
<span id="email"></span>
</div>

<div class="info">
<strong>Phone:</strong>
<span id="phone"></span>
</div>

<div class="info">
<strong>Gender:</strong>
<span id="gender"></span>
</div>

</div>

<div class="card">

<h3>Professional Information</h3>

<div class="info">
<strong>Specialization:</strong>
<span id="specialization"></span>
</div>

<div class="info">
<strong>Experience:</strong>
<span id="experience"></span>
</div>

<div class="info">
<strong>Qualification:</strong>
<span id="qualification"></span>
</div>

<div class="info">
<strong>Status:</strong>
Active
</div>

</div>

</div>

<a href="doctor-edit-profile.html" class="btn">
✏️ Edit Profile
</a>

</div>

</div>

<script>

window.onload=function(){

let doctor=
JSON.parse(
localStorage.getItem("doctor")
);

if(!doctor){

window.location.href=
"doctor-login.html";

return;

}
document.getElementById("doctorName").innerHTML =
doctor.first_name + " " + doctor.last_name;

document.getElementById("name").innerHTML =
doctor.first_name + " " + doctor.last_name;

document.getElementById("doctorSpecialization").innerHTML =
doctor.specialization;

document.getElementById("email").innerHTML =
doctor.email;

document.getElementById("phone").innerHTML =
doctor.phone;

document.getElementById("gender").innerHTML =
doctor.gender;

document.getElementById("specialization").innerHTML =
doctor.specialization;

document.getElementById("experience").innerHTML =
doctor.experience;

document.getElementById("qualification").innerHTML =
doctor.qualification;

};

</script>

</body>
</html>
