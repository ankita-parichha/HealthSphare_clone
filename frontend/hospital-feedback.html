
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Feedback</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.card{
background:#f8f9ff;
padding:20px;
border-left:5px solid #5B3FC4;
border-radius:10px;
margin-bottom:15px;
}

.card h3{
color:#5B3FC4;
margin-bottom:10px;
}

.rating{
color:orange;
font-size:20px;
}

</style>
</head>
<body>

<div class="container">

<h1>⭐ Hospital Feedback</h1>

<div id="feedbackList">

<div class="card">
<h3>Ankita Parichha</h3>
<p class="rating">⭐⭐⭐⭐⭐</p>
<p>Excellent hospital management system and service.</p>
</div>

<div class="card">
<h3>Rahul Kumar</h3>
<p class="rating">⭐⭐⭐⭐</p>
<p>Easy appointment booking and billing process.</p>
</div>

<div class="card">
<h3>Priya Sharma</h3>
<p class="rating">⭐⭐⭐⭐⭐</p>
<p>Doctors are very supportive and professional.</p>
</div>

</div>

</div>

</body>
</html>
