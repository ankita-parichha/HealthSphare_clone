
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Patients - HealthSphere</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
color:#5B3FC4;
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#5B3FC4;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.btn{
background:#22C069;
color:white;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn:hover{
background:#169a51;
}
</style>
</head>

<body>

<div class="container">

<h1>👥 My Patients</h1>

<input
type="text"
class="search"
placeholder="Search Patient...">

<table>

<thead>
<tr>
<th>Patient ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Last Visit</th>
<th>Action</th>
</tr>
</thead>

<tbody id="patientTable">

</tbody>

</table>
</div>
<script>

const doctor = JSON.parse(localStorage.getItem("doctor"));

if(!doctor){

    alert("Please login first");

    window.location.href = "doctor-login.html";

}

// ==========================
// Load My Patients
// ==========================

async function loadPatients(){

    try{

        const response = await fetch(

            `https://healthsphare-clone.onrender.com/api/appointments/doctor/${doctor.doctor_id}`

        );

        const data = await response.json();

        console.log(data);
        console.log("Appointments:", data.appointments);

        const table =
        document.getElementById("patientTable");

        table.innerHTML = "";

        data.appointments.forEach(patient=>{

            table.innerHTML += `
            <tr>

            <td>${patient.patient_code}</td>

            <td>${patient.full_name}</td>

            <td>${patient.age}</td>

            <td>${patient.gender}</td>

            <td>${new Date(patient.last_visit).toLocaleDateString("en-GB")}</td>

            <td>

            <button class="btn"
            onclick="viewPatient(${patient.patient_id})">

            View

            </button>

            </td>

            </tr>
            `;

        });

    }

    catch(error){

        console.log(error);

    }

}

// ==========================
// View Patient
// ==========================

function viewPatient(patientId){

    localStorage.setItem(

        "selectedPatientId",

        patientId

    );

    window.location.href =
    "doctor-patient-details.html";

}

window.onload = loadPatients;

</script>
</body>
</html>
