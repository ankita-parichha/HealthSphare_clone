<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Appointments - HealthSphere</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

.form-box{
background:#f8faff;
padding:20px;
border-radius:15px;
margin-bottom:25px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:white;
}
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
    white-space:nowrap;
}

thead{
background:#2563eb;
color:white;
}

th{

padding:15px;
text-align:center;
border:1px solid #ddd;

}

td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){

background:#f8faff;

}

tr:hover{

background:#eef4ff;

}
.card{
background:#f8faff;
padding:20px;
border-left:5px solid #2563eb;
border-radius:10px;
margin-top:15px;
}
.modal{

display:none;

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.5);

}

.modal-content{

background:white;

width:500px;

margin:60px auto;

padding:25px;

border-radius:15px;

position:relative;

}

.close{

position:absolute;

right:20px;

top:10px;

font-size:30px;

cursor:pointer;

color:red;

}

.modal input,
.modal select{

width:100%;

padding:12px;

margin-top:10px;

border:1px solid #ddd;

border-radius:8px;

}
</style>
</head>

<body>

<div class="container">

<h1>📅 Manage Appointments</h1>

<div class="form-box">



<button
style="float:right;margin-bottom:20px;"
onclick="openModal()">

+ Add Appointment

</button>

<div style="clear:both;"></div>

<input
type="text"
id="searchPatient"
placeholder="🔍 Search Patient">

<select id="statusFilter">
<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Confirmed">Confirmed</option>
<option value="Completed">Completed</option>
<option value="Rejected">Rejected</option>
</select>

<button onclick="loadAppointments()">
Search
</button>

</div>
<table>

<thead>

<tr>

<th>Appointment No</th>
<th>Patient ID</th>
<th>Patient Name</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="appointmentTable">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

</div>
<!-- Appointment Modal -->

<div id="appointmentModal" class="modal">

<div class="modal-content">

<span
class="close"
onclick="closeModal()">

&times;

</span>

<h2 id="modalTitle">

Add Appointment

</h2>

<input
type="hidden"
id="appointmentId">

<select id="patient"></select>

<select id="doctor"></select>

<input
type="date"
id="appointment_date">

<input
type="time"
id="appointment_time">

<select id="status">

<option>Pending</option>
<option>Confirmed</option>
<option>Completed</option>
<option>Rejected</option>

</select>

<button
id="saveBtn"
onclick="saveAppointment()">

Save Appointment

</button>

</div>

</div>
<script>

function openModal(){

clearForm();

document.getElementById("modalTitle").innerHTML =
"Add Appointment";

document.getElementById("saveBtn").innerHTML =
"Save Appointment";

document.getElementById("appointmentModal").style.display =
"block";

loadPatients();

loadDoctors();

}
window.onload = function () {

    loadAppointments();

};


async function loadAppointments() {

    try {

        const response = await fetch(
            "http://localhost:5000/api/appointments/all"
        );

        const data = await response.json();

        const table =
            document.getElementById("appointmentTable");
            

        table.innerHTML = "";

        if (!data.success || data.appointments.length === 0) {

            table.innerHTML =
            "<tr><td colspan='6'>No Appointments Found</td></tr>";

            return;

        }

        data.appointments.forEach(app => {
            console.log(app);

            table.innerHTML += `

<tr>

<td>${app.appointment_number}</td>

<td>${app.patient_code}</td>

<td>${app.patient_name}</td>

<td>Dr. ${app.doctor_name}</td>

<td>${new Date(app.appointment_date).toLocaleDateString("en-GB")}</td>

<td>${app.appointment_time}</td>

<td>${app.status}</td>

<td>

<button
style="background:#f59e0b"
onclick="editAppointment(${app.appointment_id})">

Edit

</button>

<button
style="background:#ef4444"
onclick="deleteAppointment(${app.appointment_id})">

Delete

</button>

</td>

</tr>

`;

        });

    } catch (error) {

        console.log(error);

        alert("Unable to load appointments");

    }

}
function closeModal(){

document.getElementById("appointmentModal").style.display =
"none";

}
function clearForm(){

document.getElementById("appointmentId").value="";

document.getElementById("appointment_date").value="";

document.getElementById("appointment_time").value="";

document.getElementById("status").value="Pending";

}
async function loadPatients(){

try{

const response = await fetch(
"http://localhost:5000/api/patients"
);

const data = await response.json();

const patient =
document.getElementById("patient");

patient.innerHTML="";

data.patients.forEach(p=>{

patient.innerHTML += `
<option value="${p.patient_id}">
${p.full_name}
</option>`;

});

}catch(error){

console.log(error);

}

}
async function loadDoctors(){

try{

const response = await fetch(
"http://localhost:5000/api/doctors"
);

const data = await response.json();

console.log(data);

const doctor =
document.getElementById("doctor");

doctor.innerHTML = "";

if(!data.success){
    alert(data.message);
    return;
}

data.doctors.forEach(d=>{

doctor.innerHTML += `
<option value="${d.doctor_id}">
Dr. ${d.first_name} ${d.last_name}
</option>`;

});

}catch(error){

console.log(error);

alert("Unable to Load Doctors");

}

}
// ============================
// Save Appointment
// ============================

async function saveAppointment(){

const appointmentId =
document.getElementById("appointmentId").value;

const patient_id =
document.getElementById("patient").value;

const doctor_id =
document.getElementById("doctor").value;

const appointment_date =
document.getElementById("appointment_date").value;

const appointment_time =
document.getElementById("appointment_time").value;

const status =
document.getElementById("status").value;

if(

!patient_id ||
!doctor_id ||
!appointment_date ||
!appointment_time

){

alert("Please Fill All Fields");

return;

}

let url;
let method;
let body;

if(appointmentId==""){

url="http://localhost:5000/api/appointments/register";

method="POST";

body={

patient_id,
doctor_id,
appointment_date,
appointment_time,
status

};

}else{

url="http://localhost:5000/api/appointments/"+appointmentId;

method="PUT";

body={

patient_id,
doctor_id,
appointment_date,
appointment_time,
status

};

}

try{

const response = await fetch(

url,

{

method:method,

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(body)

}

);

const data = await response.json();

alert(data.message);

closeModal();

clearForm();

loadAppointments();

}catch(error){

console.log(error);

alert("Server Error");

}

}
// ===========================
// Edit Appointment
// ===========================

async function editAppointment(id){

   alert("Edit button clicked : " + id);

    try{

        const response = await fetch(
            "http://localhost:5000/api/appointments/all"
        );

        const data = await response.json();

        const app = data.appointments.find(
            x => x.appointment_id == id
        );

        if(!app){
            alert("Appointment Not Found");
            return;
        }

        console.log("1");
await loadPatients();
console.log("2");
await loadDoctors();
console.log("3");

        console.log("4");
document.getElementById("appointmentId").value = app.appointment_id;
console.log("5");

        document.getElementById("patient").value = String(app.patient_id);

        document.getElementById("doctor").value = String(app.doctor_id);

        document.getElementById("appointment_date").value =
        app.appointment_date.split("T")[0];

        document.getElementById("appointment_time").value =
        app.appointment_time.substring(0,5);

        document.getElementById("status").value =
        app.status;

        document.getElementById("modalTitle").innerHTML =
        "Edit Appointment";

        document.getElementById("saveBtn").innerHTML =
        "Update Appointment";
        console.log("6");
        console.log("7");
        document.getElementById("appointmentModal").style.display =
        "block";

    }catch(error){

        console.log(error);

        alert("Unable to Load Appointment");

    }

}
async function deleteAppointment(id){

if(!confirm("Delete Appointment?")) return;

const response = await fetch(
"http://localhost:5000/api/appointments/"+id,
{
method:"DELETE"
}
);

const data = await response.json();

alert(data.message);

loadAppointments();

}
</script>

</body>
</html>
