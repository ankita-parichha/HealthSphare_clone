
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#5B3FC4,#7B61FF);
}

.container{
width:400px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#5B3FC4;
margin-bottom:20px;
}

label{
font-weight:600;
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#22C069;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#18a85a;
}

.back{
text-align:center;
margin-top:15px;
}

.back a{
text-decoration:none;
color:#5B3FC4;
font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

<h2>🔒 Forgot Password</h2>

<label>Select Role</label>

<select id="role">
<option>Patient</option>
<option>Doctor</option>
<option>Receptionist</option>
</select>

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email">

<button onclick="resetPassword()">
Reset Password
</button>

<div class="back">
<a href="patient-login.html">Back to Login</a>
</div>

</div>

<script>

function resetPassword(){

let role =
document.getElementById("role").value;

let email =
document.getElementById("email").value;

if(email===""){
alert("Please enter your email");
return;
}

alert(
"Password reset link sent to " +
email +
" for " +
role
);

}

</script>

</body>
</html>
