
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSphere AI Assistant</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fc;
}

.container{
max-width:800px;
margin:30px auto;
background:white;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
overflow:hidden;
}

.header{
background:#5B3FC4;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.chat-box{
height:500px;
padding:20px;
overflow-y:auto;
}

.bot{
background:#eef2ff;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.user{
background:#22C069;
color:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
text-align:right;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #ddd;
}

.input-area input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.input-area button{
margin-left:10px;
padding:12px 20px;
border:none;
background:#5B3FC4;
color:white;
border-radius:8px;
cursor:pointer;
}
.quick-buttons{

display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
justify-content:center;

}

.quick-buttons button{

background:#EEF2FF;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

.quick-buttons button:hover{

background:#5B3FC4;
color:white;

}

.bot{

background:#EEF2FF;
padding:15px;
border-radius:12px;
margin-bottom:15px;
max-width:80%;

}

.user{

background:#22C069;
color:white;
padding:15px;
border-radius:12px;
margin-left:auto;
margin-bottom:15px;
max-width:80%;

}

.typing{

color:#777;
font-style:italic;
padding:10px;

}
</style>
</head>
<body>

<div class="container">

<div class="header">
🤖 HealthSphere AI Assistant
<p style="font-size:15px;font-weight:normal;margin-top:8px;">
Symptom Checker • Appointment Help • Billing • Reports • 24/7 Support
</p>
</div>

<div class="quick-buttons">

<button onclick="quickQuestion('Book Appointment')">
📅 Book Appointment
</button>

<button onclick="quickQuestion('Doctors')">
👨‍⚕️ Doctors
</button>

<button onclick="quickQuestion('Lab Reports')">
🧪 Reports
</button>

<button onclick="quickQuestion('Bills')">
💳 Billing
</button>

</div>

<div class="chat-box" id="chatBox">

<div class="bot">

👋 Hello
<b id="patientName"></b>

<br><br>

I'm your HealthSphere AI Assistant.

How can I help you today?

</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Type your question...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const patient =
JSON.parse(localStorage.getItem("patient"));

if(patient){

document.getElementById("patientName").innerHTML =
patient.full_name;

}

function quickQuestion(question){

document.getElementById("userInput").value = question;

sendMessage();

}
function goToAppointment(){

    window.location.href = "Book-appointment.html";

}

function sendMessage(){

const input =
document.getElementById("userInput");

const message =
input.value.trim();

if(message==="") return;

const chat =
document.getElementById("chatBox");

chat.innerHTML +=
`<div class="user">${message}</div>`;

input.value="";

chat.innerHTML +=
`<div class="typing" id="typing">
🤖 AI is typing...
</div>`;

chat.scrollTop =
chat.scrollHeight;

setTimeout(()=>{

document.getElementById("typing").remove();

let reply="";

switch(message.toLowerCase()){

case "book appointment":

reply="📅 Opening Book Appointment page...";

setTimeout(function(){

window.location.href="book-appointment.html";

},1500);

break;

case "doctors":

reply="👨‍⚕️ Opening Doctor List...";

chat.innerHTML += `
<div class="bot">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

setTimeout(function(){

window.location.href = "book-appointment.html";

},1500);

return;

case "lab reports":

reply="🧪 Opening Lab Reports...";

setTimeout(function(){

window.location.href="patient-lab-reports.html";

},1500);

break;

case "bills":

reply="💳 Opening Billing page...";

setTimeout(function(){

window.location.href="patient-bills.html";

},1500);

break;

case "prescription":

reply="💊 Opening Prescriptions...";

setTimeout(function(){

window.location.href="patient-prescription.html";

},1500);

break;

case "medical records":

reply="📄 Opening Medical Records...";

setTimeout(function(){

window.location.href="patient-medical-records.html";

},1500);

break;

case "hello":

case "hi":

reply="👋 Hello! How may I assist you today?";

break;

case "emergency":

reply="🚑 If this is a medical emergency, immediately contact your nearest hospital or emergency services.";

break;

default:

const text = message.toLowerCase();
// ===============================
// Doctor Appointment Request
// ===============================

// ======================================
// Dynamic Doctor Search
// ======================================

if(
    text.includes("book") ||
    text.includes("appointment")
){

    let doctorName = text
        .replace("book","")
        .replace("appointment","")
        .replace("with","")
        .replace("dr.","")
        .replace("dr","")
        .trim();

    if(doctorName !== ""){

        searchDoctor(doctorName);

        return;

    }

}
// ==============================
// Appointment Booking by Doctor Name
// ==============================


    // Dentist
    

if(
    text.includes("fever") ||
    text.includes("cold") ||
    text.includes("cough") ||
    text.includes("infection")
){

    chat.innerHTML += `
    <div class="bot">
        🤒 Based on your symptoms, I recommend consulting a
        <b>General Physician</b>.
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    showDoctors("General Physician");

    return;

}
else if(
    text.includes("heart") ||
    text.includes("chest pain") ||
    text.includes("bp") ||
    text.includes("blood pressure")
){

    chat.innerHTML += `
    <div class="bot">
        ❤️ Based on your symptoms, I recommend consulting a
        <b>Cardiologist</b>.
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    showDoctors("Cardiologist");

    return;

}
else if(
    text.includes("headache") ||
    text.includes("migraine") ||
    text.includes("brain") ||
    text.includes("dizziness")
){

    chat.innerHTML += `
    <div class="bot">
        🧠 Based on your symptoms, I recommend consulting a
        <b>Neurologist</b>.
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    showDoctors("Neurologist");

    return;

}

else if(
    text.includes("bone") ||
    text.includes("joint") ||
    text.includes("knee") ||
    text.includes("back pain") ||
    text.includes("fracture")
){

    chat.innerHTML += `
    <div class="bot">
        🦴 Based on your symptoms, I recommend consulting an
        <b>Orthopedic Doctor</b>.
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    showDoctors("Orthopedic");

    return;

}

else if(
    text.includes("skin") ||
    text.includes("rash") ||
    text.includes("acne") ||
    text.includes("allergy")
){

    chat.innerHTML += `
    <div class="bot">
        🌿 Based on your symptoms, consult a
        <b>Dermatologist</b>.
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    showDoctors("Dermatologist");

    return;

}

else if(text.includes("eye") || text.includes("vision") || text.includes("blur")){

reply="👁️ You should consult an <b>Ophthalmologist</b>.";

}

else if(text.includes("ear") || text.includes("nose") || text.includes("throat") || text.includes("hearing")){

reply="👂 I recommend consulting an <b>ENT Specialist</b>.";

}

else if(text.includes("stomach") || text.includes("gas") || text.includes("vomiting") || text.includes("digestion") || text.includes("abdomen")){

reply="🍽️ You should consult a <b>Gastroenterologist</b>.";

}

else if(text.includes("pregnancy") || text.includes("period") || text.includes("women")){

reply="🤰 Please consult a <b>Gynecologist</b>.";

}

else if(text.includes("child") || text.includes("baby")){

reply="👶 I recommend consulting a <b>Pediatrician</b>.";

}

else if(text.includes("diabetes") || text.includes("thyroid") || text.includes("hormone")){

reply="🩺 You should consult an <b>Endocrinologist</b>.";

}

else if(text.includes("mental") || text.includes("stress") || text.includes("anxiety") || text.includes("depression")){

reply="🧠 I recommend consulting a <b>Psychiatrist</b>.";

}

else{

reply="🤖 Sorry, I couldn't identify the symptoms.<br><br>Please describe them in more detail or book an appointment with a General Physician.";

}
}

chat.innerHTML +=
`<div class="bot">${reply}</div>`;


chat.scrollTop =
chat.scrollHeight;

},1000);

}
async function showDoctors(specialization){

    try{

        const response = await fetch(
            `https://healthsphare-clone.onrender.com/api/doctors/specialization/${encodeURIComponent(specialization)}`
        );

        const data = await response.json();

        const chat = document.getElementById("chatBox");

        let html = `
        <div class="bot">
        👨‍⚕️ <b>Available ${specialization}s</b><br><br>
        `;

        if(data.length===0){
            html += "No doctors available.";

        }else{

            data.forEach(doc=>{

    html += `
    <div style="
        background:#F8FAFC;
        padding:12px;
        border-radius:10px;
        margin-bottom:12px;
        border-left:4px solid #5B3FC4;
    ">

        <h4>👨‍⚕️ Dr. ${doc.first_name} ${doc.last_name}</h4>

        <p><b>Specialization:</b> ${doc.specialization}</p>

        <p><b>Experience:</b> ${doc.experience} Years</p>

        <p><b>Consultation Fee:</b> ₹${doc.consultation_fee ?? "Not Available"}</p>

    </div>
    `;

});

            html += `
            <button
onclick="
localStorage.setItem(
'selectedSpecialization',
'${specialization}'
);
window.location.href='book-appointment.html';
"
            style="
            background:#5B3FC4;
            color:white;
            padding:10px 18px;
            border:none;
            border-radius:8px;
            cursor:pointer;">
            📅 Book Appointment
            </button>
            `;

        }

        html += "</div>";

        chat.innerHTML += html;

        chat.scrollTop = chat.scrollHeight;

    }catch(error){

        console.log(error);

    }

}
async function searchDoctor(name) {

    try {

        const response = await fetch("https://healthsphare-clone.onrender.com/api/doctors");

        const data = await response.json();

        const doctor = data.doctors.find(d => {

            const fullName = `${d.first_name} ${d.last_name}`.toLowerCase();

            return fullName.includes(name.toLowerCase());

        });

        if (doctor) {

            localStorage.setItem(
                "selectedSpecialization",
                doctor.specialization
            );

            const chat = document.getElementById("chatBox");

            chat.innerHTML += `
            <div class="bot">
                👨‍⚕️ Dr. ${doctor.first_name} ${doctor.last_name}<br>
                <b>Specialization:</b> ${doctor.specialization}<br><br>

                <button onclick="goToAppointment()"
                style="
                background:#5B3FC4;
                color:white;
                padding:10px 18px;
                border:none;
                border-radius:8px;
                cursor:pointer;">
                📅 Book Appointment
                </button>
            </div>
            `;

            chat.scrollTop = chat.scrollHeight;

        } else {

            document.getElementById("chatBox").innerHTML += `
            <div class="bot">
                ❌ Doctor not found.
            </div>
            `;

        }

    } catch (err) {

        console.log(err);

    }

}
</script>

</body>
</html>
