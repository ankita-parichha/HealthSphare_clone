
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Sign Up - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#5B3FC4,#7B61FF);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
width:100%;
max-width:700px;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
color:#333;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

input:focus,
select:focus,
textarea:focus{
border-color:#5B3FC4;
}

.btn{
width:100%;
padding:14px;
background:#22C069;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
background:#18a85a;
}

.login-link{
text-align:center;
margin-top:15px;
}

.login-link a{
color:#5B3FC4;
text-decoration:none;
font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

<h1>🏥 Patient Registration</h1>

<form id="signupForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob" max="2026-12-31" required>
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Blood Group</label>
<select id="bloodGroup" required>
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>
</div>

<div class="form-group">
<label>Address</label>
<textarea id="address" rows="3"></textarea>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>
</div>

<button type="button" class="btn" onclick="signup()">
Create Account
</button>

</form>

<div class="login-link">
Already have an account?
<a href="patient-login.html">Sign In</a>
</div>

</div>



<script>

async function signup() {

    const full_name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const gender = document.getElementById("gender").value;
    const blood_group = document.getElementById("bloodGroup").value;
    const address = document.getElementById("address").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const dob = document.getElementById("dob").value;

    if (
        !full_name ||
        !email ||
        !phone ||
        !gender ||
        !blood_group ||
        !address ||
        !password ||
        !confirmPassword ||
        !dob
    ) {
        alert("Please fill all fields");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    // Calculate Age
    const birthYear = new Date(dob).getFullYear();
    const currentYear = new Date().getFullYear();
    const age = currentYear - birthYear;

    try {

        console.log("Register button clicked");

const response = await fetch(
    "http://localhost:5000/api/auth/register",
    {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({

                    full_name,
                    age,
                    gender,
                    blood_group,
                    phone,
                    email,
                    address,
                    emergency_contact_name: "",
                    emergency_contact_phone: "",
                    password

                })
            }
        );

        const result = await response.json();
        console.log("Response Status:", response.status);
console.log("Response:", result);

        alert(result.message);

        if(result.success){

            window.location.href = "patient-login.html";

        }

    } catch (error) {

        console.log(error);
        alert("Server Error");

    }

}


</script>

</body>
</html>
