
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receptionist Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
}

.sidebar{
position:fixed;
width:250px;
height:100%;
background:#5B3FC4;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:white;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:rgba(255,255,255,.15);
}

.main{
margin-left:250px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h3{
color:#5B3FC4;
}

.card p{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:15px;
overflow:hidden;
}

th{
background:#5B3FC4;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.btn{
background:#22C069;
color:white;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>👩‍💼 Receptionist</h2>

<a href="Receptionist-dashboard.html">🏠 Dashboard</a>
<a href="register-patient.html">📝 Register Patient</a>
<a href="manage-appointments.html">📅 Appointments</a>
<a href="billing.html">💳 Billing</a>
<a href="Receptionist-doctor-availability.html">👨‍⚕️ Doctors</a>
<a href="Receptionist-profile.html">👤 Profile</a>

</div>

<div class="main">

<h1>Receptionist Dashboard</h1>

<br>

<div class="cards">

<div class="card">
<h3>Today's Patients</h3>
<p id="patientCount">0</p>
</div>

<div class="card">
<h3>Appointments</h3>
<p id="appointmentCount">0</p>
</div>

<div class="card">
<h3>Pending Bills</h3>
<p id="billiCount">0</p>
</div>

<div class="card">
<h3>Available Doctors</h3>
<p id="doctorCount">0</p>
</div>

</div>

<h2>Today's Appointments</h2>

<br>

<table>
    <thead>

<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>


<tbody id="appointmentTable">

<tr>
<td colspan="4">Loading...</td>
</tr>

</tbody>


</table>

</div>
<script>

const receptionist =
JSON.parse(localStorage.getItem("receptionist"));

if(!receptionist){

window.location.href="receptionist-login.html";

}

async function loadDashboard(){

try{

const response =
await fetch("http://localhost:5000/api/dashboard/stats");

const data =
await response.json();

document.getElementById("patientCount").innerText =
data.stats.totalPatients;

document.getElementById("doctorCount").innerText =
data.stats.totalDoctors;

document.getElementById("appointmentCount").innerText =
data.stats.totalAppointments;

document.getElementById("billCount").innerText =
data.stats.pendingBills;

}catch(error){

console.log(error);

}

}


async function loadTodayAppointments(){

    const response = await fetch(
        "http://localhost:5000/api/receptionists/today-appointments"
    );

    const data = await response.json();

    const table = document.getElementById("appointmentTable");

    table.innerHTML = "";

    if(!data.success || data.appointments.length===0){

        table.innerHTML =
        "<tr><td colspan='4'>No Appointments Today</td></tr>";

        return;

    }

    data.appointments.forEach(app=>{

        table.innerHTML += `

        <tr>

            <td>${app.patient_name}</td>

            <td>Dr. ${app.doctor_name}</td>

            <td>${app.appointment_time}</td>

            <td>${app.status}</td>

        </tr>

        `;

    });

}
window.onload = function(){

    loadDashboard();
    loadTodayAppointments();

};
</script>
</body>
</html>
