
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Login - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#E0F7FA,
#F0FDFA,
#DCFCE7
);
}

.container{
width:430px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:90px;
object-fit:contain;
}

.logo h2{
color:#2563EB;
font-size:32px;
margin-top:10px;
}

.portal{
color:#22C069;
font-size:18px;
font-weight:600;
margin-top:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:2px solid #E5E7EB;
border-radius:10px;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#22C069;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:14px;
}

.options a{
text-decoration:none;
color:#2563EB;
font-weight:bold;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(
135deg,
#22C069,
#2563EB
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-2px);
}

.google-btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#F3F4F6;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.google-btn:hover{
background:#E5E7EB;
}

.signup{
text-align:center;
margin-top:20px;
font-size:14px;
}

.signup a{
color:#2563EB;
font-weight:bold;
text-decoration:none;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">

<img src="./logo.png" alt="HealthSphere Logo">

<h2>HealthSphere</h2>

<div class="portal">
🏥 Patient Portal
</div>

</div>

<p class="subtitle">
Access appointments, prescriptions,
medical records and billing details
securely.
</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<div class="options">

<label>
<input type="checkbox">
 Remember Me
</label>

<a href="forgot-password.html">
Forgot Password?
</a>

</div>

<button
class="login-btn"
onclick="login()">
Patient Login
</button>

<button
class="google-btn"
onclick="googleLogin()">
🔵 Continue with Google
</button>

<div class="signup">

Don't have an account?

<a href="patient-signup.html">
Create Account
</a>

</div>

<div class="footer">
© 2026 HealthSphere Hospital Management System
</div>

</div>

<script>

async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill all fields");
        return;
    }

    try {

        const response = await fetch("https://healthsphare-clone.onrender.com/api/auth/login", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                email,
                password
            })

        });

        const result = await response.json();
        console.log(result);

        alert(result.message);

        if (result.success) {

            console.log(result);

localStorage.setItem(
    "patient",
    JSON.stringify(result.user)
);

console.log("Stored Patient:");
console.log(JSON.parse(localStorage.getItem("patient")));

const params = new URLSearchParams(window.location.search);

if(params.get("redirect") === "chatbot"){
    window.location.href = "health-chatbot.html";
}else{
    window.location.href = "Patient-dashboard.html";
}

        }

    } catch (error) {

        console.log(error);

        alert("Server Error");

    }

}

function googleLogin(){

alert("Google Login Successful");

window.location.href =
"Patient-dashboard.html";

}

</script>

</body>
</html>
