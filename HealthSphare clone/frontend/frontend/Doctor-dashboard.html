
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:#2563eb;
padding-top:20px;
}

.logo{
text-align:center;
color:white;
font-size:28px;
font-weight:bold;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:rgba(255,255,255,.15);
}

.main{
margin-left:250px;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout{
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h3{
color:#2563eb;
margin-bottom:10px;
}

.card p{
font-size:24px;
font-weight:bold;
}

.section{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}
.view-btn{
    margin-top:15px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.view-btn:hover{
    background:#1d4ed8;
}

</style>
</head>
<body>

<div class="sidebar">

<div class="logo">

    <div style="font-size:55px;">👨‍⚕️</div>

    <h3 id="doctorName">Doctor</h3>

    <p id="doctorSpecialization"
       style="color:#dbeafe;font-size:14px;">
        Specialization
    </p>

</div>
<a href="#">🏠 Dashboard</a>
<a href="doctor-appointments.html">📅 Appointments</a>
<a href="doctor-patient.html">👥 My Patients</a>

<a href="doctor-notifications.html">🔔 Notifications</a>

<a href="doctor-profile.html">👤 Profile</a>

</div>

<div class="main">

<div class="header">

<h1 id="welcomeDoctor">Welcome Doctor</h1>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<div class="card">

    <h3>Today's Patients</h3>

    <p id="todayPatients">0</p>

    <button
        class="view-btn"
        onclick="viewTodayPatients()">

        👁 View

    </button>

</div>

<div class="card">
<h3>Appointments</h3>
<p id="appointmentCount">0</p>
</div>





</div>

</div>

<script>
    
    const doctor = JSON.parse(localStorage.getItem("doctor"));

if (!doctor) {
    alert("Please login first");
    window.location.href = "doctor-login.html";
}
document.getElementById("doctorName").innerHTML =
    "Dr. " + doctor.first_name + " " + doctor.last_name;

document.getElementById("doctorSpecialization").innerHTML =
    doctor.specialization;

document.getElementById("welcomeDoctor").innerHTML =
`Welcome Dr. ${doctor.first_name} ${doctor.last_name}`;






function logout(){

    localStorage.removeItem("doctor");

    alert("Logged Out Successfully");

    window.location.href = "home.html";

}
async function loadDashboard() {

    const doctor = JSON.parse(localStorage.getItem("doctor"));

    if (!doctor) {
        window.location.href = "doctor-login.html";
        return;
    }

    try {

        const response = await fetch(
            `http://localhost:5000/api/appointments/doctor/${doctor.doctor_id}`
        );

        const data = await response.json();

        console.log(data);

        if (data.success) {

            document.getElementById("appointmentCount").innerText =
                data.appointments.length;

            const today = new Date().toISOString().split("T")[0];

            const todayAppointments = data.appointments.filter(a =>
                a.appointment_date.startsWith(today)
            );

            document.getElementById("todayPatients").innerText =
                todayAppointments.length;

        }

    } catch (error) {

        console.log(error);

    }

}
window.onload = function () {

    loadDashboard();

};
function viewTodayPatients(){

    window.location.href = "today-patients.html";

}
</script>

</body>
</html>
