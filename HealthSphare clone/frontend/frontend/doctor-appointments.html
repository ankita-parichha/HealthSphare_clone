
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Appointments</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btn{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
margin:2px;
}

.accept{
background:#22c55e;
}

.reject{
background:#ef4444;
}

.complete{
background:#f59e0b;
}

</style>
</head>
<body>

<div class="container">

<h1 id="pageTitle">📅 MY Appointments</h1>

<table>

<thead>

<tr>
<th>Patient</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="appointmentTable">

<tr>
<td colspan="5">
No Appointments Found
</td>
</tr>

</tbody>

</table>

</div>

<script>

const doctor = JSON.parse(localStorage.getItem("doctor"));

if (!doctor) {

    alert("Please login first");
    window.location.href = "doctor-login.html";

}

// =========================
// Load Appointments
// =========================
async function loadAppointments() {

    try {

        const response = await fetch(
            `http://localhost:5000/api/appointments/doctor/${doctor.doctor_id}`
        );

        const data = await response.json();

        const table =
            document.getElementById("appointmentTable");

        table.innerHTML = "";

        if (!data.success || data.appointments.length === 0) {

            table.innerHTML =
            "<tr><td colspan='5'>No Appointments Found</td></tr>";

            return;

        }

        data.appointments.forEach(app => {

            table.innerHTML += `

            <tr>

                <td>${app.full_name}</td>

                <td>${app.appointment_date}</td>

                <td>${app.appointment_time}</td>

                <td>${app.status}</td>

                <td>

                    <button
                    class="btn accept"
                    onclick="updateStatus(${app.appointment_id},'accept')">
                    Accept
                    </button>

                    <button
                    class="btn reject"
                    onclick="updateStatus(${app.appointment_id},'reject')">
                    Reject
                    </button>

                </td>

            </tr>

            `;

        });

    } catch (error) {

        console.log(error);

        alert("Unable to load appointments");

    }

}

// =========================
// Accept / Reject
// =========================
async function updateStatus(id, action) {

    try {

        const response = await fetch(

            `http://localhost:5000/api/appointments/${action}/${id}`,

            {
                method: "PUT"
            }

        );

        const result = await response.json();

        alert(result.message);

        loadAppointments();

    } catch (error) {

        console.log(error);

    }

}

window.onload = loadAppointments;

</script>

</body>
</html>
