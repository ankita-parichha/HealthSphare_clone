<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSphere - Manage Doctors</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#EEF4FF;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.top-bar{
display:flex;
justify-content:space-between;
gap:20px;
margin-bottom:25px;
}

.search{
flex:1;
padding:13px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

.add-btn{
background:#22C069;
color:#fff;
padding:13px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.add-btn:hover{
background:#169a51;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#5B3FC4;
color:white;
padding:14px;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #eee;
}

.edit{
background:#2563EB;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.delete{
background:#EF4444;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.active{
background:#DCFCE7;
color:#15803D;
}

.inactive{
background:#FEE2E2;
color:#DC2626;
}

/* Modal */

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
overflow:auto;
}

.modal-content{
background:white;
width:700px;
margin:40px auto;
padding:30px;
border-radius:18px;
position:relative;
}

.close{
position:absolute;
right:20px;
top:15px;
font-size:28px;
cursor:pointer;
color:red;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.save-btn{
width:100%;
padding:14px;
background:#22C069;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.save-btn:hover{
background:#169a51;
}

</style>
</head>

<body>

<div class="container">

<h1>👨‍⚕️ Manage Doctors</h1>

<div class="top-bar">

<input
type="text"
id="search"
class="search"
placeholder="Search Doctor..."
onkeyup="searchDoctor()">

<button
class="add-btn"
onclick="openModal()">

+ Add Doctor

</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Experience</th>
<th>Fee</th>
<th>Phone</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="doctorTable">

</tbody>

</table>

</div>
<!-- ===========================
     ADD / EDIT DOCTOR MODAL
=========================== -->

<div id="doctorModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2 id="modalTitle"
style="color:#5B3FC4;margin-bottom:20px;">

Add Doctor

</h2>

<!-- Hidden Doctor ID -->

<input
type="hidden"
id="doctorId">

<div class="form-group">

<label>First Name</label>

<input
type="text"
id="first_name">

</div>

<div class="form-group">

<label>Last Name</label>

<input
type="text"
id="last_name">

</div>

<div class="form-group">

<label>Gender</label>

<select id="gender">

<option value="">Select</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="form-group">

<label>Specialization</label>

<input
type="text"
id="specialization">

</div>

<div class="form-group">

<label>Qualification</label>

<input
type="text"
id="qualification">

</div>

<div class="form-group">

<label>Experience</label>

<input
type="number"
id="experience">

</div>

<div class="form-group">

<label>Consultation Fee</label>

<input
type="number"
id="consultation_fee">

</div>

<div class="form-group">

<label>Phone</label>

<input
type="text"
id="phone">

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email">

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="password">

</div>

<div class="form-group">

<label>Status</label>

<select id="status">

<option>Active</option>

<option>Inactive</option>

</select>

</div>

<button
id="saveBtn"
class="save-btn"
onclick="saveDoctor()">

Save Doctor

</button>

</div>

</div>
<script>

let doctors = [];
let isEdit = false;

//=========================
// Open Modal
//=========================

function openModal(){

    document.getElementById("doctorModal").style.display="block";

}

//=========================
// Close Modal
//=========================

function closeModal(){

    document.getElementById("doctorModal").style.display="none";

    clearForm();

}

//=========================
// Clear Form
//=========================

function clearForm(){

    isEdit=false;

    document.getElementById("doctorId").value="";
    document.getElementById("modalTitle").innerHTML="Add Doctor";
    document.getElementById("saveBtn").innerHTML="Save Doctor";

    document.getElementById("first_name").value="";
    document.getElementById("last_name").value="";
    document.getElementById("gender").value="";
    document.getElementById("specialization").value="";
    document.getElementById("qualification").value="";
    document.getElementById("experience").value="";
    document.getElementById("consultation_fee").value="";
    document.getElementById("phone").value="";
    document.getElementById("email").value="";
    document.getElementById("password").value="";
    document.getElementById("status").value="Active";

}

//=========================
// Load Doctors
//=========================

window.onload=loadDoctors;

async function loadDoctors(){

    const response=await fetch("https://healthsphare-clone.onrender.com/api/doctors");

    const data=await response.json();

    doctors=data.doctors;

    showDoctors(doctors);

}

//=========================
// Show Doctors
//=========================

function showDoctors(list){

    const table=document.getElementById("doctorTable");

    table.innerHTML="";

    list.forEach(doc=>{

        table.innerHTML+=`

        <tr>

        <td>${doc.doctor_id}</td>

        <td>Dr. ${doc.first_name} ${doc.last_name}</td>

        <td>${doc.specialization}</td>

        <td>${doc.experience}</td>

        <td>₹${doc.consultation_fee}</td>

        <td>${doc.phone}</td>

        <td>${doc.status}</td>

        <td>

        <button
        class="edit"
        onclick="editDoctor(${doc.doctor_id})">

        Edit

        </button>

        <button
        class="delete"
        onclick="deleteDoctor(${doc.doctor_id})">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

}

//=========================
// Search
//=========================

function searchDoctor(){

const value=document
.getElementById("search")
.value
.toLowerCase();

const filtered=doctors.filter(doc=>

(doc.first_name+" "+doc.last_name)

.toLowerCase()

.includes(value)

);

showDoctors(filtered);

}

//=========================
// Edit Doctor
//=========================

function editDoctor(id){

const doctor=doctors.find(d=>d.doctor_id==id);

if(!doctor) return;

isEdit=true;

document.getElementById("doctorId").value=doctor.doctor_id;

document.getElementById("modalTitle").innerHTML="Edit Doctor";

document.getElementById("saveBtn").innerHTML="Update Doctor";

document.getElementById("first_name").value=doctor.first_name;
document.getElementById("last_name").value=doctor.last_name;
document.getElementById("gender").value=doctor.gender;
document.getElementById("specialization").value=doctor.specialization;
document.getElementById("qualification").value=doctor.qualification;
document.getElementById("experience").value=doctor.experience;
document.getElementById("consultation_fee").value=doctor.consultation_fee;
document.getElementById("phone").value=doctor.phone;
document.getElementById("email").value=doctor.email;
document.getElementById("status").value=doctor.status;

openModal();

}

//=========================
// Save Doctor
//=========================

async function saveDoctor(){

const doctor={

first_name:first_name.value,
last_name:last_name.value,
gender:gender.value,
specialization:specialization.value,
qualification:qualification.value,
experience:experience.value,
consultation_fee:consultation_fee.value,
phone:phone.value,
email:email.value,
password:password.value,
status:status.value

};

let url="https://healthsphare-clone.onrender.com/api/doctors/register";

let method="POST";

if(isEdit){

url="https://healthsphare-clone.onrender.com/api/doctors/"+doctorId.value;

method="PUT";

}

const response=await fetch(url,{

method:method,

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(doctor)

});

const data=await response.json();

alert(data.message);

closeModal();

loadDoctors();

}

//=========================
// Delete Doctor
//=========================

async function deleteDoctor(id){

if(!confirm("Delete this Doctor?"))

return;

const response=await fetch(

"https://healthsphare-clone.onrender.com/api/doctors/"+id,

{

method:"DELETE"

}

);

const data=await response.json();

alert(data.message);

loadDoctors();

}

</script>
</body>
</html>
