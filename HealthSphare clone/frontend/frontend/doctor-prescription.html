<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Prescription - HealthSphere</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

.form-box{
background:#f8faff;
padding:20px;
border-radius:15px;
margin-bottom:25px;
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

textarea{
resize:none;
}

.btn{
background:#22c55e;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#16a34a;
}

.card{
background:#f8faff;
padding:20px;
border-left:5px solid #2563eb;
border-radius:12px;
margin-top:15px;
}

.card h3{
color:#2563eb;
margin-bottom:10px;
}

.card p{
margin:6px 0;
}

.delete-btn{
margin-top:10px;
background:#ef4444;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.delete-btn:hover{
background:#dc2626;
}

.empty{
text-align:center;
padding:20px;
color:gray;
}
</style>

</head>
<body>

<div class="container">

<h1>💊 Doctor Prescription</h1>

<div class="form-box">


<input
type="number"
id="patient_id"
placeholder="Patient ID"
readonly>

<input type="text" id="medicine" placeholder="Medicine Name">

<input type="text" id="dosage" placeholder="Dosage">

<input type="text" id="duration" placeholder="Duration">

<textarea id="instructions" rows="4"
placeholder="Instructions"></textarea>

<button class="btn" onclick="addPrescription()">
Save Prescription
</button>

</div>

<h2>Saved Prescriptions</h2>

<div id="prescriptionList"></div>

</div>

<script>

window.onload = function(){

    document.getElementById("patient_id").value =
        localStorage.getItem("prescriptionPatientId");

};

async function addPrescription(){

const doctor =
JSON.parse(localStorage.getItem("doctor"));

const patient_id =
localStorage.getItem("prescriptionPatientId");

const medicines =
document.getElementById("medicine").value;

const dosage =
document.getElementById("dosage").value;

const instructions =
document.getElementById("instructions").value;

const next_visit =
document.getElementById("duration").value;

if(
!patient_id ||
!medicines ||
!dosage
){
alert("Please fill all fields");
return;
}

try{

const response = await fetch(
"http://localhost:5000/api/prescriptions/add",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

patient_id,
doctor_id:doctor.doctor_id,
medicines,
dosage,
instructions,
next_visit

})

}
);

const result = await response.json();

alert(result.message);

}
catch(error){

console.log(error);

alert("Server Error");

}

}



</script>

</body>
</html>
