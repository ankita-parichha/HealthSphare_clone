
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Records - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#5B3FC4;
margin-bottom:25px;
}

.card{
background:#f8f9ff;
padding:20px;
border-left:5px solid #5B3FC4;
border-radius:12px;
margin-bottom:20px;
}

.card h3{
color:#5B3FC4;
margin-bottom:10px;
}

.empty{
text-align:center;
padding:40px;
color:gray;
font-size:18px;
}

.btn{
background:#22C069;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

<h1>📄 Medical Records</h1>

<div id="recordsContainer">

<div class="empty">

📋 No Medical Records Available

<br><br>

Medical records will appear here after
doctor consultation and treatment.

</div>

</div>

</div>



<script>

const patient = JSON.parse(localStorage.getItem("patient"));

if (!patient) {

    alert("Please login first");
    window.location.href = "Patient-login.html";

}

async function loadMedicalRecords(){

    try{

        // Get patient profile first
const profileResponse = await fetch(
`http://localhost:5000/api/auth/profile/${patient.user_id}`
);

const profileData = await profileResponse.json();

const patient_id = profileData.patient.patient_id;

// Now load medical records
const response = await fetch(
`http://localhost:5000/api/medical-records/patient/${patient_id}`
);

        const data = await response.json();

        const container =
        document.getElementById("recordsContainer");

        container.innerHTML = "";

        if(
            !data.success ||
            data.records.length===0
        ){

            container.innerHTML = `

            <div class="empty">

                📋 No Medical Records Available

                <br><br>

                Medical records will appear here after
                doctor consultation and treatment.

            </div>

            `;

            return;

        }

        data.records.forEach(record=>{

            container.innerHTML += `

            <div class="card">

                <h3>
                Dr. ${record.first_name} ${record.last_name}
                </h3>

                <p>
                <b>Specialization:</b>
                ${record.specialization}
                </p>

                <p>
                <b>Diagnosis:</b>
                ${record.diagnosis}
                </p>

                <p>
                <b>Treatment:</b>
                ${record.treatment}
                </p>

                <p>
                <b>Notes:</b>
                ${record.notes}
                </p>

                <p>
                <b>Date:</b>
                ${new Date(record.created_at).toLocaleDateString()}
                </p>

            </div>

            `;

        });

    }
    catch(error){

        console.log(error);

        alert("Unable to load medical records");

    }

}

window.onload = loadMedicalRecords;



</script>

</body>
</html>
