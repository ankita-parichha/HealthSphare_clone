
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - HealthSphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#E0F2FE,
#F0FDF4,
#DCFCE7
);
}

.container{
width:450px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:90px;
object-fit:contain;
}

.logo h2{
color:#2563EB;
font-size:32px;
margin-top:10px;
}

.portal{
color:#0F172A;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
font-size:14px;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:2px solid #E5E7EB;
border-radius:10px;
outline:none;
font-size:15px;
transition:.3s;
}

input:focus{
border-color:#2563EB;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:14px;
}

.options a{
text-decoration:none;
color:#2563EB;
font-weight:bold;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(
135deg,
#1E293B,
#2563EB
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-2px);
}

.google-btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#F3F4F6;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.google-btn:hover{
background:#E5E7EB;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}

.security{
background:#EFF6FF;
padding:10px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
font-size:13px;
color:#1E40AF;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">

<img src="./logo.png" alt="HealthSphere Logo">

<h2>HealthSphere</h2>

<div class="portal">
👨‍💼 Administrator Portal
</div>

</div>

<p class="subtitle">
Manage hospital operations, staff,
patients and system settings securely.
</p>

<div class="security">
🔒 Secure Admin Access
</div>

<div class="input-group">
<input
type="email"
id="email"
placeholder="Admin Email">
</div>

<div class="input-group">
<input
type="password"
id="password"
placeholder="Admin Password">
</div>

<div class="options">

<label>
<input type="checkbox">
 Remember Me
</label>

<a href="forgot-password.html">
Forgot Password?
</a>

</div>

<button
class="login-btn"
onclick="login()">
Admin Login
</button>

<button
class="google-btn"
onclick="googleLogin()">
🔵 Continue with Google
</button>

<div class="footer">
© 2026 HealthSphere Administration Panel
</div>

</div>

<script>
    if(localStorage.getItem("patient")){

    alert("You are already logged in as a Patient. Please logout first.");

    window.location.href = "Patient-dashboard.html";

}



async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill all fields");
        return;
    }

    try {

        const response = await fetch("https://healthsphare-clone.onrender.com/api/admin/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();

        if (data.success) {

            // Save admin details
            localStorage.setItem(
                "admin",
                JSON.stringify(data.admin)
            );

            alert("Admin Login Successful");

            window.location.href = "Admin-dashboard.html";

        } else {

            alert(data.message);

        }

    } catch (error) {

        console.error(error);
        alert("Server Error");

    }

}


function googleLogin(){

alert("Google Login Successful");

window.location.href=
"Admin-dashboard.html";

}

</script>

</body>
</html>
